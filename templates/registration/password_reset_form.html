{% extends "base.html" %}

{% block title %}Crear contraseña{% endblock %}

{% block content %}
<main class="login-wrapper">
    <h1>Crear o restablecer contraseña</h1>

    <section class="login-card">
        <p>Ingresa el correo con el que fuiste registrado como emprendedor.</p>
        <form method="post">
            {% csrf_token %}
            <div class="field">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>
            <button type="submit">Enviar correo de recuperación</button>
        </form>
    </section>
</main>
{% endblock %}
