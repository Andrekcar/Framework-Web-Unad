{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<h2>Iniciar sesión</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}

</form>
<p><a href="{% url 'password_reset' %}">¿Soy emprendedor, cómo creo mi contraseña?</a></p>
{% endblock %}
